name: Deploy to Cloud Run

env:
  SERVICE_NAME: fastapi-ml-model-service
  PROJECT_ID: sportlink-b061c
  DOCKER_IMAGE_REPO: us-central1-docker.pkg.dev/sportlink-b061c/fastapi-ml-model/fastapi-ml-model

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dockerize-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Google Cloud Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ env.DOCKER_IMAGE_REPO }}:${IMAGE_TAG}
          docker build -t ${IMAGE_URI} -f Dockerfile.prod .
          docker push ${IMAGE_URI}

      - name: Deploy to Cloud Run
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ env.DOCKER_IMAGE_REPO }}:${IMAGE_TAG}
          echo SERVICE_NAME $SERVICE_NAME
          gcloud run deploy $SERVICE_NAME \
            --image ${IMAGE_URI} \
            --platform managed \
            --region us-east1 \
            --allow-unauthenticated
